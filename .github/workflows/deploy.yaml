name: Deploy to AWS EC2

on:
    push:
        branches: [master]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: copy-code
              uses: actions/checkout@v6

            - name: Install Node js
              uses: actions/setup-node@v6
              with:
                  node-version: 24.13.0

            - name: Install Dependencies
              run: npm install --frozen-lockfile

            - name: Build App
              run: npm build

    deploy:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: copy-code
              uses: actions/checkout@v6

            - name: Install Node js
              uses: actions/setup-node@v6
              with:
                  node-version: 24.13.0

            - name: Install Dependencies
              run: npm install --frozen-lockfile

            - name: Build App
              run: npm build

            - name: Deploy to EC2
              env:
                  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
                  EC2_HOST: ${{ secrets.EC2_HOST }}
                  EC2_USER: ${{ secrets.EC2_USER }}
              run: |
                  # 1. Setup the SSH directory and key
                  mkdir -p ~/.ssh
                  echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
                  chmod 600 ~/.ssh/id_rsa

                  # 2. Add the EC2 host to known_hosts to avoid the "trust" prompt
                  ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

                  # 3. Connect and run commands on the server
                  ssh $EC2_USER@$EC2_HOST << 'EOF'
                      cd /home/ubuntu/project/backend/ecommerce-server
                      
                      # 2. Pull the latest code
                      git pull origin master
                      
                      # 3. Install and Build (If not done in a separate 'build' job)
                      npm install --frozen-lockfile
                      npm run build
                      
                      # 4. Restart using your ecosystem file
                      # We go up one level to find the config file
                      pm2 startOrRestart ../ecosystem.config.js --env production
                      
                      # 5. Save the process list so it survives a server reboot
                      pm2 save
                  EOF
